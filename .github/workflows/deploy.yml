name: Manual Deploy Infra Service

env:
  INFRA: crypto-knight-infra

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service"
        type: choice
        options:
          - rabbitmq
          - observability
          - filebeat
          - ansible
      role:
        description: "Role"
        type: choice
        options:
          - crypto-bot
          - prod2
          - prod3
      bootstrap:
        description: "Run bootstrap playbook"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Select server
        run: |
          case "${{ github.event.inputs.role }}" in
            crypto-bot)
              echo "HOST=193.168.173.51" >> $GITHUB_ENV
              ;;
            prod2)
              echo "HOST=103.45.247.73" >> $GITHUB_ENV
              ;;
            prod3)
              echo "HOST=5.180.182.201" >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown role"
              exit 1
              ;;
          esac
      ############################################################
      # NORMAL DOCKER DEPLOY
      ############################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy artefacts
        if: ${{ github.event.inputs.service != 'ansible' }}
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./${{ github.event.inputs.service }}"
          target: ./${{ env.INFRA }}

      - name: Fix filebeat config permissions
        if: ${{ github.event.inputs.service == 'filebeat' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ./${{ env.INFRA }}/${{ github.event.inputs.service }}
            sudo chown root:root ./filebeat.yml
            sudo chmod 644 ./filebeat.yml

      - name: Deploy docker service
        if: ${{ github.event.inputs.service != 'ansible' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ./${{ env.INFRA }}/${{ github.event.inputs.service }}
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d
      ############################################################
      # ANSIBLE DEPLOY
      ############################################################
      - name: Install Ansible
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Setup SSH key for Ansible
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
      ############################################################
      # BOOTSTRAP (root)
      ############################################################
      - name: Create bootstrap inventory
        if: ${{ github.event.inputs.service == 'ansible' && github.event.inputs.bootstrap }}
        run: |
          mkdir -p ansible/.ci
          cat <<EOF > ansible/.ci/bootstrap.ini
          [bootstrap]
          $HOST ansible_user=root ansible_ssh_private_key_file=~/.ssh/deploy_key ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run Bootstrap
        if: ${{ github.event.inputs.service == 'ansible' && github.event.inputs.bootstrap }}
        run: |
          cd ansible
          ansible-playbook -i .ci/bootstrap.ini bootstrap.yml
      ############################################################
      # MAIN PLAYBOOK (ansible user)
      ############################################################
      - name: Create main inventory
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          cat <<EOF > ansible/.ci/main.ini
          [servers]
          $HOST ansible_user=ansible ansible_ssh_private_key_file=~/.ssh/deploy_key ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Run Main Playbook
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          cd ansible
          ansible-playbook -i .ci/main.ini playbook.yml
