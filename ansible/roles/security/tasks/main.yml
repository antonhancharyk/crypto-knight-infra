- name: Install UFW
  apt:
    name: ufw
    state: present

- name: Allow required ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ allowed_ports }}"

- name: Set default incoming deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow docker forwarding
  lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
  notify: reload ufw
  
- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart ssh

- name: Disable password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify: restart ssh

- name: Enable pubkey auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
  notify: restart ssh

- name: Set MaxAuthTries
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^MaxAuthTries'
    line: 'MaxAuthTries {{ ssh_max_auth_tries }}'
  notify: restart ssh

- name: Enable TCP syncookies
  sysctl:
    name: net.ipv4.tcp_syncookies
    value: 1
    state: present
    reload: true

- name: Install Fail2Ban
  apt:
    name: fail2ban
    state: present

- name: Configure Fail2Ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban

- name: Ensure Fail2Ban started
  service:
    name: fail2ban
    state: started
    enabled: true
