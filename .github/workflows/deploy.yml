name: Manual Deploy Infra Service

env:
  INFRA: crypto-knight-infra

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service"
        type: choice
        options:
          - rabbitmq
          - observability
          - ansible
      bootstrap:
        description: "Run bootstrap playbook"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      ############################################################
      # NORMAL DOCKER DEPLOY
      ############################################################
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy artefacts
        if: ${{ github.event.inputs.service != 'ansible' }}
        uses: appleboy/scp-action@master
        with:
          host: 5.180.182.41
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./${{ github.event.inputs.service }}"
          target: ./${{ env.INFRA }}

      - name: Deploy docker service
        if: ${{ github.event.inputs.service != 'ansible' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 5.180.182.41
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ./${{ env.INFRA }}/${{ github.event.inputs.service }}
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d
      ############################################################
      # ANSIBLE DEPLOY
      ############################################################
      - name: Install Ansible
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Setup SSH key for Ansible
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          for host in 185.247.117.229 185.220.205.55 5.180.182.41; do
            ssh-keyscan -H "$host" >> ~/.ssh/known_hosts
          done
      ############################################################
      # BOOTSTRAP (root)
      ############################################################
      - name: Run Bootstrap
        if: ${{ github.event.inputs.service == 'ansible' && github.event.inputs.bootstrap == 'true' }}
        run: |
          cd ansible
          ansible -i inventory_bootstrap.ini all -m ping
          ansible-playbook -i inventory_bootstrap.ini bootstrap.yml
      ############################################################
      # MAIN PLAYBOOK (ansible user)
      ############################################################
      - name: Check all servers are reachable
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          cd ansible
          ansible -i inventory.ini servers -m ping
          
      - name: Run Main Playbook
        if: ${{ github.event.inputs.service == 'ansible' }}
        run: |
          cd ansible
          ansible-playbook -i inventory.ini playbook.yml
